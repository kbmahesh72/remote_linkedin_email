queries=Hiring Java C2C Remote,Hiring Java W2 Remote
blocked-post-keywords=Sales,Bench
max-scrolls=10
scroll-pause=2.0
output-dir=automation-output
profile-dir=playwright-profile
browser.headless=false
browser.viewport.width=1440
browser.viewport.height=960
browser.max-unchanged-scroll-rounds=3
browser.scroll-pixels=2200
browser.post-settle-ms=500
browser.page-settle-ms=2500
browser.search-settle-ms=3000
browser.login-submit-wait-ms=6000
browser.manual-login-poll-ms=2000
browser.ui-settle-ms=1500
browser.expand-settle-ms=350
browser.click-timeout-ms=5000
browser.posts-click-timeout-ms=4000
browser.operation-timeout-ms=3000
login-timeout=300
max-emails=8
interval-minutes=2
run-once=false
linkedin.home-url=https://www.linkedin.com/
linkedin.login-url=https://www.linkedin.com/login
linkedin.search-url-template=https://www.linkedin.com/search/results/content/?keywords=%s
linkedin.email-env-var=LINKEDIN_EMAIL
linkedin.password-env-var=LINKEDIN_PASSWORD

email.enabled=true
email.dry-run=false
email.accounts.file=config/java-email-accounts.csv
email.accounts=
gmail.username=
gmail.app.password=
gmail.app-password-env-var=GMAIL_APP_PASSWORD
gmail.account-password-env-prefix=GMAIL_APP_PASSWORD_
cc.email=
attachment.path=
subject.templates.dir=templates/subjects
body.templates.dir=templates/body
subject.template.path=templates/subjects/default.txt
subject.variants.path=
body.template.path=templates/body/default.txt

smtp.auth=true
smtp.starttls.enable=true
